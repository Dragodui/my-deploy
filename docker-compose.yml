services:
    postgres-auth:
      image: postgres:16
      environment:
        POSTGRES_DB: auth_db
        POSTGRES_USER: auth
        POSTGRES_PASSWORD: authpass
      ports:
        - "5433:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U auth -d auth_db"]
        interval: 2s
        timeout: 5s
        retries: 10

    auth-service:
      build:
        context: .
        dockerfile: cmd/auth-service/Dockerfile
      environment:
        PORT: "8081"
        GRPC_PORT: "9081"
        DB_DSN: "postgres://auth:authpass@postgres-auth:5432/auth_db?sslmode=disable"
        JWT_SECRET: "your-secret"
      depends_on:
        postgres-auth:
          condition: service_healthy

    postgres-agent:
      image: postgres:16
      environment:
        POSTGRES_DB: agent_db
        POSTGRES_USER: agent
        POSTGRES_PASSWORD: agentpass
      ports:
        - "5434:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U agent -d agent_db"]
        interval: 2s
        timeout: 5s
        retries: 10

    agent-service:
      build:
        context: .
        dockerfile: cmd/agent-service/Dockerfile
      environment:
        PORT: "8082"
        GRPC_PORT: "9082"
        DB_DSN: "postgres://agent:agentpass@postgres-agent:5432/agent_db?sslmode=disable"
        JWT_SECRET: "your-secret"
      depends_on:
        postgres-agent:
          condition: service_healthy

    postgres-deploy:
      image: postgres:16
      environment:
        POSTGRES_DB: deploy_db
        POSTGRES_USER: deploy
        POSTGRES_PASSWORD: deploypass
      ports:
        - "5435:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U deploy -d deploy_db"]
        interval: 2s
        timeout: 5s
        retries: 10

    deploy-service:
      build:
        context: .
        dockerfile: cmd/deploy-service/Dockerfile
      environment:
        PORT: "8083"
        DB_DSN: "postgres://deploy:deploypass@postgres-deploy:5432/deploy_db?sslmode=disable"
        AGENT_URL: "agent-service:9082"
        TEMPLATE_URL: "http://template-service:8084"
      depends_on:
        postgres-deploy:
          condition: service_healthy
        agent-service:
          condition: service_started
        template-service:
          condition: service_started

    template-service:
      build:
        context: .
        dockerfile: cmd/template-service/Dockerfile
      environment:
        PORT: "8084"
        TEMPLATES_DIR: "/templates"

    gateway:
      build:
        context: .
        dockerfile: cmd/gateway/Dockerfile
      environment:
        PORT: "8080"
        JWT_SECRET: "your-secret"
        AUTH_SERVICE_URL: "http://auth-service:8081"
        AGENT_SERVICE_URL: "http://agent-service:8082"
        DEPLOY_SERVICE_URL: "http://deploy-service:8083"
        TEMPLATE_SERVICE_URL: "http://template-service:8084"
      ports:
        - "8080:8080"
      depends_on:
        - auth-service
        - agent-service
        - deploy-service
        - template-service