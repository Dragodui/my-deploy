services:
    postgres-auth:
      image: postgres:16
      environment:
        POSTGRES_DB: auth_db
        POSTGRES_USER: auth
        POSTGRES_PASSWORD: authpass
      ports:
        - "5433:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U auth -d auth_db"]
        interval: 2s
        timeout: 5s
        retries: 10

    
    postgres-agent:
      image: postgres:16
      environment:
        POSTGRES_DB: agent_db
        POSTGRES_USER: agent
        POSTGRES_PASSWORD: agentpass
      ports:
        - "5434:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U agent -d agent_db"]
        interval: 2s
        timeout: 5s
        retries: 10

   
    postgres-deploy:
      image: postgres:16
      environment:
        POSTGRES_DB: deploy_db
        POSTGRES_USER: deploy
        POSTGRES_PASSWORD: deploypass
      ports:
        - "5435:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U deploy -d deploy_db"]
        interval: 2s
        timeout: 5s
        retries: 10