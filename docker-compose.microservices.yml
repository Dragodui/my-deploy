services:
    postgres-auth:
      image: postgres:16
      environment:
        POSTGRES_DB: auth_db
        POSTGRES_USER: auth
        POSTGRES_PASSWORD: authpass
      ports:
        - "5433:5432"

    auth-service:
      build:
        context: .
        dockerfile: cmd/auth-service/Dockerfile
      environment:
        PORT: "8081"
        GRPC_PORT: "9081"
        DB_DSN: "postgres://auth:authpass@postgres-auth:5432/auth_db?sslmode=disable"
        JWT_SECRET: "your-secret"
      depends_on:
        - postgres-auth

    postgres-agent:
      image: postgres:16
      environment:
        POSTGRES_DB: agent_db
        POSTGRES_USER: agent
        POSTGRES_PASSWORD: agentpass
      ports:
        - "5434:5432"

    agent-service:
      build:
        context: .
        dockerfile: cmd/agent-service/Dockerfile
      environment:
        PORT: "8082"
        GRPC_PORT: "9082"
        DB_DSN: "postgres://agent:agentpass@postgres-agent:5432/agent_db?sslmode=disable"
        JWT_SECRET: "your-secret"
      depends_on:
        - postgres-agent


    gateway:
      build:
        context: .
        dockerfile: cmd/gateway/Dockerfile
      environment:
        PORT: "8080"
        JWT_SECRET: "your-secret"
        AUTH_SERVICE_URL: "http://auth-service:8081"
        AGENT_SERVICE_URL: "http://agent-service:8082"
        # DEPLOY_SERVICE_URL: "http://localhost:8083"
        # TEMPLATE_SERVICE_URL: "http://localhost:8084"
      ports:
        - "8080:8080"
      depends_on:
        - auth-service