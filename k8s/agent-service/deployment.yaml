apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
spec:
  selector:
    matchLabels:
      app: agent
  replicas: 1
  template:
    metadata:
      labels:
        app: agent
    spec:
      containers:
        - name: agent-container
          image: my-registry/agent-service:v1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: agent-secret
                  key: DB_DSN
          envFrom:
            - configMapRef:
                name: agent-configmap
      restartPolicy: Always