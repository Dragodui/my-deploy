apiVersion: apps/v1
kind: Deployment
metadata:
  name: template-service
spec:
  selector:
    matchLabels:
      app: template
  replicas: 1
  template:
    metadata:
      labels:
        app: template
    spec:
      containers:
        - name: template-container
          image: my-registry/template-service:v1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: template-configmap
      restartPolicy: Always
